<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>installation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0ece4;
      color: #1a1a1a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Titlebar ── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 6px;
      margin-bottom: 20px;
    }

    #titlebar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #app-name {
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    #status-text {
      color: #666;
    }

    #status-text.processing { color: #b05a00; }
    #status-text.done       { color: #1a1a1a; }
    #status-text.error      { color: #900; }

    /* ── Image row ── */
    #images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .img-pane {
      border: 1px solid #1a1a1a;
      background: #e8e4dc;
    }

    .img-pane-bar {
      border-bottom: 1px solid #1a1a1a;
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ddd9d1;
    }

    .img-pane-bar span {
      color: #444;
    }

    .img-pane-body {
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 12px;
    }

    .img-pane-body img {
      width: 100%;
      display: block;
    }

    /* ── File explorer ── */
    #explorer {
      border: 1px solid #1a1a1a;
    }

    #explorer-bar {
      border-bottom: 1px solid #1a1a1a;
      padding: 3px 8px;
      background: #ddd9d1;
      display: flex;
      gap: 24px;
    }

    #explorer-bar span {
      color: #666;
    }

    #file-list {
      min-height: 80px;
    }

    .file-row {
      display: grid;
      grid-template-columns: 20px 180px 1fr 90px;
      align-items: baseline;
      padding: 3px 8px;
      border-bottom: 1px solid #ddd9d1;
      gap: 12px;
      line-height: 1.5;
    }

    .file-row:last-child { border-bottom: none; }

    .file-row:hover { background: #e8e4dc; }

    .file-icon { color: #666; text-align: center; }

    .file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-prompt {
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-kind {
      color: #999;
      text-align: right;
      font-size: 11px;
    }

    .file-kind.person      { color: #7a4a00; }
    .file-kind.conditional { color: #004a7a; }
    .file-kind.gpt         { color: #2a6a2a; }

    #empty-msg {
      padding: 10px 8px;
      color: #999;
    }
  </style>
</head>
<body>

  <!-- titlebar -->
  <div id="titlebar">
    <div id="titlebar-left">
      <span id="app-name">installation.py</span>
      <span id="status-text">—</span>
    </div>
    <span style="color:#999">localhost:5000</span>
  </div>

  <!-- images -->
  <div id="images">
    <div class="img-pane">
      <div class="img-pane-bar">
        <span>&#128247;</span>
        <span>capture</span>
      </div>
      <div class="img-pane-body" id="capture-body">no capture</div>
    </div>
    <div class="img-pane">
      <div class="img-pane-bar">
        <span>&#127916;</span>
        <span>output.gif</span>
      </div>
      <div class="img-pane-body" id="output-body">awaiting pipeline</div>
    </div>
  </div>

  <!-- file explorer -->
  <div id="explorer">
    <div id="explorer-bar">
      <span>name</span>
      <span>prompt</span>
      <span style="margin-left:auto">kind</span>
    </div>
    <div id="file-list">
      <div id="empty-msg">—</div>
    </div>
  </div>

  <script>
    let lastGifUrl = null;
    let lastFileCount = 0;

    function setStatus(status, message) {
      const el = document.getElementById('status-text');
      el.textContent = message;
      el.className = status;
    }

    function updateCapture(url) {
      if (!url) return;
      const body = document.getElementById('capture-body');
      body.innerHTML = `<img src="${url}" alt="capture">`;
    }

    function updateOutput(url) {
      const body = document.getElementById('output-body');
      if (!url) {
        body.innerHTML = 'awaiting pipeline';
        return;
      }
      body.innerHTML = `<img src="${url}" alt="output">`;
    }

    function icon(type) {
      if (type === 'person')      return '&#128100;';
      if (type === 'conditional') return '&#128196;';
      return '&#128196;';
    }

    function updateFiles(files) {
      const list = document.getElementById('file-list');
      const empty = document.getElementById('empty-msg');

      if (!files || files.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        lastFileCount = 0;
        return;
      }

      if (files.length === lastFileCount) return;
      lastFileCount = files.length;

      list.innerHTML = files.map((f, i) => `
        <div class="file-row">
          <span class="file-icon">${icon(f.type)}</span>
          <span class="file-name">${String(i + 1).padStart(2, '0')}_${f.label}</span>
          <span class="file-prompt">${f.prompt}</span>
          <span class="file-kind ${f.type}">${f.type}</span>
        </div>
      `).join('');
    }

    async function poll() {
      try {
        const res  = await fetch('/status');
        const data = await res.json();

        setStatus(data.status, data.message);
        updateCapture(data.capture_url);
        updateFiles(data.files || []);

        if (data.gif_url && data.gif_url !== lastGifUrl) {
          lastGifUrl = data.gif_url;
          updateOutput(data.gif_url);
        } else if (!data.gif_url) {
          lastGifUrl = null;
          updateOutput(null);
        }

      } catch (e) { /* server not up yet */ }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
